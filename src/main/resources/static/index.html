<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Data KTP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>

<body class="container mt-5">

<h2 class="mb-4">Manajemen Data KTP</h2>

<div class="card mb-4">
    <div class="card-body">

        <h5 id="formTitle">Tambah Data KTP</h5>

        <form id="ktpForm">

            <input type="hidden" id="ktpId">

            <div class="row g-3">

                <div class="col-md-4">
                    <label class="form-label">Nomor KTP</label>
                    <input type="text" id="nomorKtp" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" id="namaLengkap" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Alamat</label>
                    <input type="text" id="alamat" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Tanggal Lahir</label>
                    <input type="date" id="tanggalLahir" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Jenis Kelamin</label>
                    <select id="jenisKelamin" class="form-control">
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>

                <div class="col-md-4 d-flex align-items-end">

                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100">
                        Simpan Data
                    </button>

                    <button
                            type="button"
                            id="btnCancel"
                            class="btn btn-secondary ms-2"
                            style="display:none;"
                            onclick="resetForm()"
                    >
                        Batal
                    </button>

                </div>

            </div>

        </form>
    </div>
</div>

<table class="table table-bordered table-striped">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nomor KTP</th>
        <th>Nama Lengkap</th>
        <th>Alamat</th>
        <th>Tanggal Lahir</th>
        <th>Jenis Kelamin</th>
        <th>Aksi</th>
    </tr>
    </thead>

    <tbody id="ktpTableBody"></tbody>

</table>

<script>

    const apiUrl = "/ktp";
    let isUpdate = false;

    $(document).ready(function () {

        loadKtp();

        $("#ktpForm").submit(function (e) {

            e.preventDefault();

            const ktpData = {
                nomorKtp: $("#nomorKtp").val(),
                namaLengkap: $("#namaLengkap").val(),
                alamat: $("#alamat").val(),
                tanggalLahir: $("#tanggalLahir").val(),
                jenisKelamin: $("#jenisKelamin").val()
            };

            if (isUpdate) {
                const id = $("#ktpId").val();
                updateKtp(id, ktpData);
            } else {
                addKtp(ktpData);
            }

        });

    });

    function loadKtp() {

        $.get(apiUrl, function (response) {

            let rows = "";

            response.data.forEach(ktp => {

                rows += `
                    <tr>
                        <td>${ktp.id}</td>
                        <td>${ktp.nomorKtp}</td>
                        <td>${ktp.namaLengkap}</td>
                        <td>${ktp.alamat}</td>
                        <td>${ktp.tanggalLahir}</td>
                        <td>${ktp.jenisKelamin}</td>
                        <td>

                            <button class="btn btn-warning btn-sm"
                                onclick="editKtp(
                                    '${ktp.id}',
                                    '${ktp.nomorKtp}',
                                    '${ktp.namaLengkap}',
                                    '${ktp.alamat}',
                                    '${ktp.tanggalLahir}',
                                    '${ktp.jenisKelamin}'
                                )">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-sm"
                                onclick="deleteKtp('${ktp.id}')">
                                Hapus
                            </button>

                        </td>
                    </tr>
                `;

            });

            $("#ktpTableBody").html(rows);

        });

    }

    function addKtp(data) {

        $.ajax({
            url: apiUrl,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(data),

            success: function () {
                alert("Data KTP berhasil ditambahkan");
                resetForm();
                loadKtp();
            },

            error: function (err) {
                alert("Gagal menambahkan data");
                console.error(err);
            }

        });

    }

    function updateKtp(id, data) {

        $.ajax({
            url: apiUrl + "/" + id,
            type: "PUT",
            contentType: "application/json",
            data: JSON.stringify(data),

            success: function () {
                alert("Data berhasil diupdate");
                resetForm();
                loadKtp();
            },

            error: function (err) {
                alert("Gagal update data");
                console.error(err);
            }

        });

    }

    function deleteKtp(id) {

        if (confirm("Yakin ingin menghapus data ini?")) {

            $.ajax({
                url: apiUrl + "/" + id,
                type: "DELETE",

                success: function () {
                    alert("Data berhasil dihapus");
                    loadKtp();
                },

                error: function (err) {
                    alert("Gagal menghapus data");
                    console.error(err);
                }

            });

        }

    }

    function editKtp(id, nomorKtp, namaLengkap, alamat, tanggalLahir, jenisKelamin) {

        $("#ktpId").val(id);
        $("#nomorKtp").val(nomorKtp);
        $("#namaLengkap").val(namaLengkap);
        $("#alamat").val(alamat);
        $("#tanggalLahir").val(tanggalLahir);
        $("#jenisKelamin").val(jenisKelamin);

        isUpdate = true;

        $("#formTitle").text("Update Data KTP");
        $("#btnSubmit").text("Update Data");
        $("#btnCancel").show();

    }

    function resetForm() {

        $("#ktpForm")[0].reset();
        $("#ktpId").val("");

        isUpdate = false;

        $("#formTitle").text("Tambah Data KTP");
        $("#btnSubmit").text("Simpan Data");
        $("#btnCancel").hide();

    }

</script>

</body>
</html>
